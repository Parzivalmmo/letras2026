<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador Ultra Limpio</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #111111;
            padding: 60px 20px;
            display: flex;
            justify-content: center;
        }

        .wrapper {
            width: 100%;
            max-width: 600px;
        }

        #search-input {
            width: 100%;
            padding: 12px 0;
            font-size: 22px;
            border: none;
            border-bottom: 2px solid #e5e5e5;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 20px;
        }

        #search-input:focus {
            border-bottom-color: #111111;
        }

        .words-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .word-item {
            font-size: 18px;
            color: #222222;
            padding: 4px 0;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <input type="text" id="search-input" placeholder="Escribe para buscar entre miles de palabras..." autocomplete="off">
    <div class="words-list" id="results-container"></div>
</div>

<script>
    // =========================================================================
    // GENERADOR AUTOMÁTICO DE 100 PALABRAS ÚNICAS POR LETRA (A-Z)
    // =========================================================================
    const abecedario = "ABCDEFGHIJKLMNÑOPQRSTUVWXYZ".split("");
    const milesDePalabras = [];

    // Diccionario de raíces y terminaciones reales para simular un diccionario masivo y limpio
    const raices = ["bar", "cor", "mar", "sol", "ter", "pla", "alt", "fin", "lum", "nor", "ras", "tem", "vol", "cas", "den", "fer", "gan", "hum", "ins", "lin", "mil", "nat", "orfe", "par", "qui", "ren", "sal", "tor", "urb", "via", "zon", "ana", "bel", "cri", "doc", "est", "fil", "gla", "hid", "inf", "jur", "kar", "lit", "mac", "neo", "ocu", "pax", "que", "rad", "sil", "tec", "uni", "val", "xil", "yan", "zaf"];
    const sufijos = ["ado", "edo", "ido", "ito", "ilo", "ica", "ora", "on", "al", "ar", "er", "or", "ante", "ente", "anza", "ismo", "ista", "ura", "ela", "ina", "eno", "io", "ia", "as", "es", "os", "is", "co", "ca", "to", "ta", "do", "da", "ro", "ra", "zo", "za"];

    abecedario.forEach(letra => {
        const palabrasDeEstaLetra = new Set(); // El Set evita que existan duplicados
        
        // Creamos combinaciones únicas hasta tener exactamente 100 por letra
        let intento = 0;
        while (palabrasDeEstaLetra.size < 100 && intento < 2000) {
            const raiz = raices[Math.floor(Math.random() * raices.length)];
            const sufijo = sufijos[Math.floor(Math.random() * sufijos.length)];
            
            // Creamos una palabra limpia que inicie con la letra actual
            let palabraGenerada = letra + raiz + sufijo;
            
            // Forzar minúsculas excepto la primera letra
            palabraGenerada = palabraGenerada.charAt(0).toUpperCase() + palabraGenerada.slice(1).toLowerCase();
            
            palabrasDeEstaLetra.add(palabraGenerada);
            intento++;
        }
        
        // Las pasamos al almacén global
        palabrasDeEstaLetra.forEach(p => milesDePalabras.push(p));
    });

    // Ordenar todo alfabéticamente
    milesDePalabras.sort((a, b) => a.localeCompare(b, 'es', { sensitivity: 'base' }));

    // =========================================================================
    // LÓGICA DEL BUSCADOR
    // =========================================================================
    const searchInput = document.getElementById('search-input');
    const resultsContainer = document.getElementById('results-container');

    searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();

        // Si el buscador está vacío, la pantalla no muestra nada
        if (query === "") {
            resultsContainer.innerHTML = "";
            return;
        }

        // Filtrar coincidencias en la lista gigante
        const filtradas = milesDePalabras.filter(palabra => 
            palabra.toLowerCase().includes(query)
        );

        // Renderizar solo texto plano y limpio
        renderLista(filtradas);
    });

    function renderLista(lista) {
        resultsContainer.innerHTML = "";
        
        // Limitamos la vista a máximo 50 resultados simultáneos para que la pantalla sea cómoda
        const limiteVisual = lista.slice(0, 50);

        limiteVisual.forEach(palabra => {
            const item = document.createElement('div');
            item.className = 'word-item';
            item.textContent = palabra; 
            resultsContainer.appendChild(item);
        });
    }
</script>

</body>
</html>
