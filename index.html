<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Palabras Reales en Español</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #111111;
            padding: 60px 20px;
            display: flex;
            justify-content: center;
        }

        .wrapper {
            width: 100%;
            max-width: 600px;
        }

        /* Buscador minimalista */
        #search-input {
            width: 100%;
            padding: 12px 0;
            font-size: 22px;
            border: none;
            border-bottom: 2px solid #e5e5e5;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 20px;
        }

        #search-input:focus {
            border-bottom-color: #111111;
        }

        /* Lista de palabras limpias */
        .words-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .word-item {
            font-size: 18px;
            color: #222222;
            padding: 4px 0;
            animation: fadeIn 0.15s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>

<div class="wrapper">
