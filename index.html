<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Palabras Limpio</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #111111;
            padding: 60px 20px;
            display: flex;
            justify-content: center;
        }

        .wrapper {
            width: 100%;
            max-width: 600px;
        }

        /* Buscador minimalista */
        #search-input {
            width: 100%;
            padding: 12px 0;
            font-size: 22px;
            border: none;
            border-bottom: 2px solid #e5e5e5;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 20px;
        }

        #search-input:focus {
            border-bottom-color: #111111;
        }

        /* Lista de palabras limpias */
        .words-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .word-item {
            font-size: 18px;
            color: #222222;
            padding: 4px 0;
            animation: fadeIn 0.15s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <input type="text" id="search-input" placeholder="Escribe para buscar palabras..." autocomplete="off">
    <div class="words-list" id="results-container"></div>
</div>

<script>
    // Tu lista de miles de palabras básicas. Solo texto plano.
    const milesDePalabras = [
        "Abanico", "Abdomen", "Abismo", "Abogado", "Abrigo", "Absorber", "Abuelo", "Acción", "Aceite", "Acedo",
        "Bailar", "Balanza", "Balcón", "Ballena", "Banco", "Banda", "Baño", "Barco", "Barril", "Basura",
        "Caballo", "Cabeza", "Cable", "Cadena", "Café", "Caja", "Calamar", "Calor", "Cama", "Cámara",
        "Dado", "Daga", "Danza", "Dato", "Delfín", "Delgado", "Diente", "Dinero", "Dinosaurio", "Disco",
        "Eclipse", "Eco", "Efecto", "Eje", "Elefante", "Elegir", "Embudo", "Enano", "Energía", "Enero",
        "Fábrica", "Fácil", "Factor", "Faja", "Falda", "Fama", "Familia", "Faro", "Fase", "Febrero",
        "Galaxia", "Galleta", "Gallo", "Gancho", "Ganso", "Garaje", "Gato", "Gema", "Geranio", "Gigante",
        "Habitar", "Hacha", "Halcón", "Hamaca", "Harina", "Helado", "Hélice", "Hielo", "Hierro", "Hijo",
        "Iglú", "Imán", "Impacto", "Impresora", "Incendio", "Indio", "Infante", "Insecto", "Isla", "Izquierda",
        "Jabón", "Jacinto", "Jaguar", "Jaula", "Jazmín", "Jefe", "Jinete", "Jirafa", "Joya", "Juguete",
        "Kilo", "Kilogramo", "Kilómetro", "Kiosco", "Kiwi", "Koala", "Kriptón", "Kurdo",
        "Labio", "Ladrillo", "Lagarto", "Lámpara", "Lana", "Lápiz", "Lata", "León", "Letra", "Libro",
        "Madera", "Madre", "Imán", "Maleta", "Mano", "Manzana", "Mapa", "Mariposa", "Martillo", "Mesa",
        "Naipe", "Naranja", "Nariz", "Naturaleza", "Nave", "Neblina", "Nectar", "Nido", "Nieve", "Noche",
        "Ñandú", "Ñame", "Ñandutí", "Ñato", "Ñoqui", "Ñu",
        "Oasis", "Objeto", "Océano", "Ocho", "Oeste", "Oído", "Ojo", "Olivo", "Olla", "Oro",
        "Padre", "Página", "Pájaro", "Pala", "Palabra", "Palma", "Pantera", "Papel", "Pared", "Patín",
        "Querella", "Queso", "Química", "Quimera", "Quince", "Quinta", "Quiste",
        "Radar", "Radio", "Raíz", "Rama", "Rana", "Ratón", "Rayo", "Receta", "Reloj", "Río",
        "Sábado", "Sábana", "Saco", "Sal", "Salmón", "Sapo", "Satélite", "Sello", "Silbato", "Sol",
        "Tabaco", "Tabla", "Taco", "Taladro", "Tambor", "Tanque", "Tapiz", "Tarjeta", "Taza", "Teatro",
        "Universo", "Uno", "Uña", "Urna", "Urraca", "Usado", "Usuario", "Útil", "Utopía",
        "Vaca", "Vacuna", "Valle", "Vapor", "Vaso", "Vela", "Velocidad", "Ventana", "Verde", "Viaje",
        "Web", "Wifi", "Windsurf", "Whisky",
        "Xenón", "Xilófono", "Xilografía",
        "Yate", "Yegua", "Yema", "Yeti", "Yodo", "Yogur", "Yunque",
        "Zafiro", "Zanahoria", "Zapato", "Zarza", "Zorro", "Zueco", "Zumo"
        // Añade aquí todas las palabras entre comillas separadas por comas que quieras
    ];

    const searchInput = document.getElementById('search-input');
    const resultsContainer = document.getElementById('results-container');

    // Ordenar alfabéticamente
    milesDePalabras.sort((a, b) => a.localeCompare(b.palabra, 'es', { sensitivity: 'base' }));

    searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();

        // Si está vacío el buscador, la pantalla queda vacía por completo
        if (query === "") {
            resultsContainer.innerHTML = "";
            return;
        }

        // Filtrar palabras que contengan el texto ingresado
        const filtradas = milesDePalabras.filter(palabra => 
            palabra.toLowerCase().includes(query)
        );

        // Renderizar la lista limpia
        renderLista(filtradas);
    });

    function renderLista(lista) {
        resultsContainer.innerHTML = "";

        lista.forEach(palabra => {
            const item = document.createElement('div');
            item.className = 'word-item';
            item.textContent = palabra; // Solo inyecta el texto limpio
            resultsContainer.appendChild(item);
        });
    }
</script>

</body>
</html>
